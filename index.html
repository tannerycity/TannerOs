<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#012A3A">
<title>TannerOS v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--ink:#0B1418;--deep:#012A3A;--deep2:#013A4E;--teal:#056C7F;--teal-d:#004568;
--gold:#B8A464;--gold-d:#9C8A4F;--cream:#E6E5DC;
--bg:#F2F1EA;--card:#FFFFFF;--text:#13242B;--muted:#5C6B72;--line:#E2E0D5;--soft:#E7F1F1;
--green:#16A34A;--orange:#E08A00;--red:#C0362C;
--radius:18px;--shadow:0 14px 35px rgba(1,42,58,.12);
--disp:'Barlow Condensed',Impact,sans-serif;--body:'Barlow',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
h1,h2,h3,.disp{font-family:var(--disp);letter-spacing:.01em}
.hidden{display:none!important}
button,input,select,textarea{font:inherit}
button{border:0;border-radius:14px;padding:11px 15px;font-weight:700;cursor:pointer;font-family:var(--body)}
.btn{background:var(--teal);color:#fff}
.btn:hover{background:var(--teal-d)}
.btn.secondary{background:var(--soft);color:var(--teal-d)}
.btn.secondary:hover{background:#d8e9e9}
.btn.good{background:var(--green)}
.btn.warn{background:var(--orange);color:#fff}
.btn.danger{background:var(--red)}
.btn.ghost{background:transparent;color:var(--teal);padding:6px 8px}
.btn.ghost.gold{color:var(--gold-d)}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fff;color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(5,108,127,.14)}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.ic{width:20px;height:20px;flex:none;vertical-align:middle}
.app{min-height:100vh}
/* LOGIN */
.login{min-height:100vh;display:grid;place-items:center;padding:22px;position:relative;overflow:hidden}
.login-bg{position:fixed;inset:0;background:
 radial-gradient(120% 90% at 50% -10%,rgba(5,108,127,.45),transparent 60%),
 radial-gradient(90% 70% at 80% 110%,rgba(184,164,76,.18),transparent 55%),
 linear-gradient(160deg,#021E2A,#012A3A 55%,#01151D);z-index:0}
.login-card{position:relative;z-index:1;max-width:400px;width:100%;background:rgba(255,255,255,.04);
 border:1px solid rgba(255,255,255,.10);border-radius:26px;padding:30px 26px;backdrop-filter:blur(8px);
 box-shadow:0 30px 70px rgba(0,0,0,.45)}
.login-brand{text-align:center;margin-bottom:22px}
.login-logo{width:78px;height:78px;object-fit:contain;margin:0 auto 12px;display:block;filter:drop-shadow(0 6px 18px rgba(184,164,76,.25))}
.login-name{font-family:var(--disp);font-weight:800;font-size:30px;color:#fff;letter-spacing:.02em}
.login-name span{color:var(--gold)}
.login-tag{font-family:var(--disp);font-weight:700;font-size:16px;color:var(--gold);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.login-sub{font-size:12px;color:#9FB8BE;letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.login-card label{color:#A9C2C8}
.login-card input,.login-card select{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#fff}
.login-card input::placeholder{color:#7E979D}
.login-card option{color:#13242B}
.btn-enter{width:100%;margin-top:18px;background:var(--gold);color:#1A1A1A;font-family:var(--disp);font-weight:800;
 font-size:18px;letter-spacing:.04em;text-transform:uppercase;padding:14px}
.btn-enter:hover{background:#cab878}
.login-foot{text-align:center;color:#7E979D;font-size:11px;margin:18px 0 0;letter-spacing:.08em}
/* LAYOUT */
.layout{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--deep),#01202C);color:#fff;padding:16px 14px;position:sticky;top:0;height:100vh;overflow:auto}
.side-top{display:flex;align-items:center;gap:11px;margin:6px 4px 18px}
.side-logo{width:38px;height:38px;object-fit:contain;flex:none}
.side-title{font-family:var(--disp);font-size:20px;font-weight:800}
.side-sub{font-size:11px;color:#8FB0B6;letter-spacing:.04em}
.nav{display:grid;gap:4px}
.nav button{width:100%;display:flex;align-items:center;gap:11px;text-align:left;background:transparent;color:#C3D6DA;font-weight:600;border-radius:12px;padding:11px 12px;border-left:3px solid transparent}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:rgba(5,108,127,.30);color:#fff;border-left-color:var(--gold)}
.nav button .ic{color:inherit}
.side-out{width:100%;margin-top:16px;background:rgba(255,255,255,.06);color:#CFE0E3}
.main{min-width:0;display:flex;flex-direction:column;position:relative}
.topbar{position:sticky;top:0;z-index:10;background:rgba(242,241,234,.9);backdrop-filter:blur(12px);
 display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line)}
.topbar .ttl{font-family:var(--disp);font-size:20px;font-weight:700}
.menu-btn{display:none;background:var(--deep);color:#fff;padding:9px 11px}
.status-pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 11px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:600}
.dot{width:9px;height:9px;border-radius:999px;background:var(--green)}
.dot.warn{background:var(--orange)}.dot.bad{background:var(--red)}
.syncbar{height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);background-size:200% 100%;animation:slide 1.1s linear infinite}
@keyframes slide{0%{background-position:200% 0}100%{background-position:-200% 0}}
.content{padding:18px;max-width:1180px;margin:auto;width:100%}
.hero{background:linear-gradient(135deg,var(--deep),var(--teal-d));color:#fff;border-radius:26px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(184,164,76,.22),transparent 70%)}
.hero h1{margin:0 0 6px;font-size:30px}
.hero p{margin:0;color:#BFD7DC;font-size:15px}
.grid{display:grid;gap:14px}
.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 8px 24px rgba(1,42,58,.05)}
.card h2,.card h3{margin:0 0 12px}
.metric{font-family:var(--disp);font-size:34px;font-weight:800;color:var(--deep);line-height:1}
.kpi-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:flex;align-items:center;gap:6px}
.kpi-label .ic{width:15px;height:15px;color:var(--teal)}
.muted{color:var(--muted)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}
.between h2{margin:0;font-size:24px}
.table-wrap{overflow:auto;border-radius:16px;border:1px solid var(--line);background:#fff}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
tr:last-child td{border-bottom:0}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:#FAFAF6;font-weight:700}
.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:var(--soft);color:var(--teal-d)}
.badge.good{background:#DCFCE7;color:#166534}.badge.warn{background:#FEF3C7;color:#92400E}.badge.bad{background:#FEE2E2;color:#991B1B;display:block;margin-top:8px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 12px}
.form-error{background:#FEE2E2;color:#991B1B;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-weight:600;font-size:14px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:16px;padding:12px 18px;box-shadow:var(--shadow);z-index:99;max-width:92vw;font-weight:600}
.modal{position:fixed;inset:0;background:rgba(1,21,29,.5);display:grid;place-items:end center;z-index:80;padding:12px}
.modal-card{width:min(720px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:24px;padding:20px;box-shadow:var(--shadow)}
.modal-card h2{font-size:22px}
.mobile-nav{display:none}
.empty{padding:30px 22px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;background:#fff}
.empty .ic{width:30px;height:30px;color:var(--teal);opacity:.7;margin-bottom:8px}
.empty p{margin:0 0 12px;font-weight:500}
.danger-zone{display:none!important}
/* SPLASH */
.splash{position:fixed;inset:0;z-index:200;display:grid;place-items:center;text-align:center;
 background:radial-gradient(120% 90% at 50% 35%,#0E2D52,#0A1F3C 60%,#06152A);transition:opacity .5s;color:#fff}
.splash.out{opacity:0;pointer-events:none}
.splash img{width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 0 26px rgba(184,164,76,.45));animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.05);opacity:1}}
.splash .wm{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:.12em;margin-top:24px}
.splash .sb{font-size:12px;letter-spacing:.34em;color:#9FB8C6;margin-top:6px}
.splash .ln{width:96px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto 0}
.splash .tag{position:absolute;bottom:42px;left:0;right:0;font-size:11px;letter-spacing:.34em;color:rgba(255,255,255,.28)}
/* ONBOARDING */
.onb{min-height:100vh;display:grid;place-items:center;padding:22px;position:relative;color:#fff}
.onb .login-bg{background:radial-gradient(120% 90% at 50% 20%,rgba(14,45,82,.9),#0A1F3C 60%,#06152A)}
.onb-card{position:relative;z-index:1;max-width:440px;width:100%;text-align:center;padding:34px 26px;
 background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:26px;backdrop-filter:blur(8px)}
.onb-card img{width:62px;height:62px;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 6px 18px rgba(184,164,76,.3))}
.onb-eye{font-family:var(--disp);color:var(--gold);letter-spacing:.28em;font-size:12px;text-transform:uppercase}
.onb-title{font-family:var(--disp);font-weight:800;font-size:34px;margin:6px 0 2px}
.onb-sub{font-size:12px;letter-spacing:.14em;color:#9FB8C6;text-transform:uppercase}
.onb-ln{width:64px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto}
.onb-body{color:#C7DDE3;font-size:15px;line-height:1.55;min-height:78px}
.onb-dots{display:flex;gap:7px;justify-content:center;margin:18px 0}
.onb-dots i{width:9px;height:9px;border-radius:999px;background:rgba(255,255,255,.22);display:inline-block;transition:.2s}
.onb-dots i.on{background:var(--gold);width:26px}
.onb-card label{color:#A9C2C8;text-align:left}
.onb-card input{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#fff;text-align:left}
.onb-card input::placeholder{color:#7E979D}
.onb-skip{display:block;margin:14px auto 0;background:transparent;color:#9FB8C6;font-size:13px}
/* GLOBAL SEARCH */
.gsearch{position:relative;flex:1;max-width:440px}
.gsearch .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:17px;height:17px}
.gsearch input{padding-left:36px;border-radius:999px;background:#fff}
.search-panel{position:absolute;left:18px;right:18px;top:60px;z-index:30;background:#fff;border:1px solid var(--line);
 border-radius:18px;box-shadow:var(--shadow);max-height:70vh;overflow:auto;padding:8px}
.search-panel .sp-group{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:10px 12px 4px}
.search-panel .sp-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer}
.search-panel .sp-item:hover{background:var(--soft)}
.search-panel .sp-item .ic{color:var(--teal);width:18px;height:18px}
.search-panel .sp-empty{padding:18px;text-align:center;color:var(--muted)}
.crown{color:var(--gold);width:15px;height:15px;vertical-align:-2px}
/* CAJA: botones grandes Cobrar/Pagar */
.cash-actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:4px 0 16px}
.cash-btn{border-radius:22px;padding:26px 18px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow);min-height:128px;justify-content:center}
.cash-btn .ic{width:34px;height:34px}
.cash-btn b{font-family:var(--disp);font-size:26px;letter-spacing:.03em;text-transform:uppercase}
.cash-btn span{font-size:13px;opacity:.92}
.cash-in{background:linear-gradient(140deg,#1B9E54,#0F7A3D)}
.cash-out{background:linear-gradient(140deg,#D8632A,#B23A1E)}
.cash-btn:active{transform:scale(.99)}
.bal{font-family:var(--disp);font-size:30px;font-weight:800;line-height:1}
.bal.pos{color:var(--green)}.bal.neg{color:var(--red)}
.mv-in{color:var(--green);font-weight:700}.mv-out{color:var(--red);font-weight:700}
.pill-in{background:#DCFCE7;color:#166534}.pill-out{background:#FEE2E2;color:#991B1B}
/* AVATAR / FOTO */
.avatar{border-radius:50%;background:var(--soft);color:var(--teal-d);display:inline-flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;overflow:hidden;flex:none;border:2px solid var(--line)}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.lg{width:96px;height:96px;font-size:34px}
.avatar.md{width:54px;height:54px;font-size:20px}
.avatar.sm{width:36px;height:36px;font-size:14px}
.photo-zone{display:flex;gap:14px;align-items:center;border:1px dashed var(--line);border-radius:16px;padding:12px;margin-bottom:12px;background:#FAFAF6}
.photo-zone.drag{border-color:var(--teal);background:var(--soft)}
.photo-zone .pz-actions{display:flex;flex-direction:column;gap:8px}
.name-cell{display:flex;align-items:center;gap:10px}
/* MATCH grid */
.mtab{display:flex;gap:8px;margin-bottom:14px}
.mtab button{background:#fff;border:1px solid var(--line);color:var(--teal-d);border-radius:999px;padding:9px 16px;font-weight:700}
.mtab button.on{background:var(--deep);color:#fff;border-color:var(--deep)}
.stat-grid input{padding:7px 8px;border-radius:10px;font-size:13px;text-align:center;min-width:54px}
.stat-grid select{padding:7px 8px;border-radius:10px;font-size:13px}
.lead-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.lead-row b{font-family:var(--disp);font-size:18px;color:var(--deep)}
.ficha-stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.ficha-stat b{font-family:var(--disp);font-size:24px;display:block;color:var(--deep);line-height:1}
.ficha-stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cap{display:inline-block;background:var(--gold);color:#1A1A1A;font-weight:800;font-size:10px;border-radius:4px;padding:1px 5px;vertical-align:1px}
.jersey{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;border-radius:9px;background:var(--deep);color:#fff;font-family:var(--disp);font-weight:800;font-size:16px;padding:0 7px}
.btn.mini{padding:5px 9px;font-size:12px}
.acts{display:flex;gap:6px;flex-wrap:wrap}
.dorsal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px;margin-top:10px}
.dz{border-radius:12px;padding:8px 4px;text-align:center;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:1px;min-height:56px;justify-content:center;font-family:inherit}
.dz b{font-family:var(--disp);font-size:18px;line-height:1}
.dz span{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.dz.taken{background:var(--deep);color:#fff;border-color:var(--deep)}
.dz.free{background:#fff;color:var(--teal-d);cursor:pointer}
.dz.free span{color:var(--muted)}
.dz.free:active{background:var(--soft)}
#print-area{display:none}
@media print{body.printing #app{display:none!important}body.printing #print-area{display:block!important}@page{margin:14mm}}
/* ATTENDANCE SESSION */
.sess-head{background:var(--deep);color:#fff;border-radius:18px;padding:14px;display:flex;gap:6px;flex-wrap:wrap;justify-content:space-between;margin:14px 0}
.sess-stat{text-align:center;min-width:70px}
.sess-stat b{font-family:var(--disp);font-size:24px;display:block;line-height:1}
.sess-stat span{font-size:10px;letter-spacing:.04em;color:#9FB8C6;text-transform:uppercase}
.att-grid td .seg{display:flex;gap:4px}
.att-grid select,.att-grid input{padding:7px 8px;border-radius:10px;font-size:13px}
.att-grid td{vertical-align:middle}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:600;cursor:pointer;color:var(--teal-d)}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
/* CONVOCATORIA */
.conv-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.bucket h4{margin:0 0 8px;font-family:var(--disp);font-size:15px;letter-spacing:.02em}
.bucket .b-conv{color:var(--green)}.bucket .b-duda{color:var(--orange)}.bucket .b-no{color:var(--red)}
.roster-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.roster-row .segb{display:flex;gap:4px}
.segb button{padding:5px 8px;font-size:12px;border-radius:9px;background:var(--soft);color:var(--teal-d)}
.segb button.on-c{background:var(--green);color:#fff}.segb button.on-d{background:var(--orange);color:#fff}.segb button.on-n{background:var(--red);color:#fff}
.msg-prev{background:#F8FAF8;border:1px solid var(--line);border-radius:14px;padding:14px;white-space:pre-wrap;font-size:14px;min-height:180px;color:var(--text)}
/* CALENDAR */
.cal{display:grid;grid-template-columns:7px;gap:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:8px 0}
.cal-cell{min-height:74px;border:1px solid var(--line);padding:6px;font-size:13px;position:relative;background:#fff}
.cal-cell.muted-day{background:#FAFAF6;color:#B7C0C4}
.cal-cell.today{outline:2px solid var(--teal);outline-offset:-2px}
.cal-cell .d{font-weight:700}
.cal-dot{display:inline-block;width:7px;height:7px;border-radius:999px;margin:2px 2px 0 0}
.cal-dot.ev{background:var(--teal)}.cal-dot.bd{background:var(--gold)}
.cal-bd{font-size:11px;color:var(--gold-d);margin-top:2px;line-height:1.2}
.cal-ev{font-size:11px;color:var(--teal-d);margin-top:2px;line-height:1.2;font-weight:600}
@media(max-width:860px){.conv-cols,.cal-grid{grid-template-columns:1fr}.cal-grid{grid-template-columns:repeat(7,1fr)}.cal-cell{min-height:52px;font-size:11px;padding:3px}.gsearch{display:none}.search-toggle{display:inline-flex!important}}
.search-toggle{display:none}
.topbar.search-open .gsearch{display:block;position:absolute;left:10px;right:10px;top:56px;z-index:31;max-width:none}
@media(max-width:860px){
 .layout{grid-template-columns:1fr}
 .sidebar{position:fixed;inset:0 24% 0 0;z-index:50;transform:translateX(-105%);transition:.2s}
 .sidebar.open{transform:translateX(0)}
 .menu-btn{display:inline-flex}
 .content{padding:14px 12px 86px}
 .grid.cols-2,.grid.cols-3,.grid.cols-4,.form-grid{grid-template-columns:1fr}
 .hero h1{font-size:25px}.topbar{padding:12px}
 .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:45;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}

 .mobile-nav button{flex:0 0 auto;min-width:68px;border-radius:0;background:#fff;color:var(--muted);padding:8px 6px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
 .mobile-nav button .ic{width:21px;height:21px}
 .mobile-nav button.active{color:var(--teal);background:#EEF6F6}
 th,td{font-size:13px;padding:9px}
 .status-text{display:none}
 .modal-card{max-height:94vh;border-radius:18px 18px 0 0;padding:16px;width:100%}
 .modal{align-items:flex-end}
 .btn{padding:12px 16px}
 .btn.ghost,.btn.mini{padding:9px 12px}
 .acts{flex-direction:column;gap:6px}
 .acts .btn{width:100%}
 .cash-actions{grid-template-columns:1fr}
 .chip{padding:10px 16px;font-size:14px}
 .dorsal-grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr))}
 .ficha-stat b{font-size:20px}
 .grid.cols-4{grid-template-columns:repeat(2,1fr)}
}

function playerSportStats(pid){const att=repos.attendance.list().filter(a=>a.playerId===pid); const trainings=att.filter(a=>(a.type||'')!=='Partido'); const present=trainings.filter(a=>a.status==='Presente'); const late=trainings.filter(a=>a.punctuality==='Tarde'||a.status==='Retardo'); const absent=trainings.filter(a=>a.status==='Ausente'); const stats=repos.matchStats.list().filter(s=>s.playerId===pid&&s.attended==='true'); const played=stats.length; const goals=stats.reduce((a,s)=>a+num(s.goals),0); const assists=stats.reduce((a,s)=>a+num(s.assists),0); const matchIds=stats.map(s=>s.matchId); const matches=repos.matches.list().filter(m=>matchIds.includes(m.id)); const semis=matches.filter(m=>/semi/i.test(m.phase)).length; const finals=matches.filter(m=>/final/i.test(m.phase)).length; const pct=trainings.length?Math.round(present.length/trainings.length*100):0; const lastAtt=trainings.map(a=>a.date).sort().slice(-1)[0]||''; const lastMatch=matches.map(m=>m.date).sort().slice(-1)[0]||''; return {trainings:trainings.length,present:present.length,late:late.length,absent:absent.length,pct,played,goals,assists,semis,finals,lastAtt,lastMatch,yellow:stats.reduce((a,s)=>a+num(s.yellowCards),0),red:stats.reduce((a,s)=>a+num(s.redCards),0)}}
function topList(kind){const players=repos.players.list(); const arr=players.map(p=>{const s=playerSportStats(p.id); return {name:`${p.name} ${p.apellidos}`,rec:p,val:kind==='goals'?s.goals:kind==='assists'?s.assists:s.pct}}).filter(x=>kind==='attendance'?true:x.val>0).sort((a,b)=>b.val-a.val).slice(0,5); return arr}
function fichaText(p){const s=playerSportStats(p.id); const yn=v=>v==='true'?'Sí':'No'; return ['Ficha del Tanner '+(p.code||''),(`${p.name} ${p.apellidos}`).trim(),'Numero: '+(p.number||'-'),'Categoria: '+(p.category||'-'),'Posicion: '+(p.position||'-'),'Talla: '+(p.size||'-'),'Capitan: '+yn(p.captain),'Tutor: '+(p.tutor||'-')+' '+(p.phone||''),'Emergencia: '+(p.emergencyContact||'-')+' '+(p.emergencyPhone||''),'Tipo de sangre: '+(p.blood||'-'),'Alergias: '+(p.allergies||'Ninguna'),'Mensualidad: '+(p.monthlyFee||'-'),'Beca: '+(p.scholarship==='true'?(p.scholarshipType||'Si'):'No'),'Documentos -> Acta: '+yn(p.docActa)+' | CURP: '+yn(p.docCurp)+' | Estudios: '+yn(p.docStudies),'','Historial deportivo:','Entrenamientos registrados: '+s.trainings,'Asistencias: '+s.present,'Retardos: '+s.late,'Ausencias: '+s.absent,'Porcentaje de asistencia: '+s.pct+'%','Partidos jugados: '+s.played,'Goles: '+s.goals,'Asistencias de gol: '+s.assists,'Semifinales: '+s.semis,'Finales: '+s.finals,'Ultima asistencia: '+(s.lastAtt||'-'),'Ultimo partido: '+(s.lastMatch||'-'),'Actualizado: '+new Date().toLocaleString('es-MX'),'','Curtimos campeones del mundo. #WeAreTanners'].join('\n')}
function downloadText(filename,content){const blob=new Blob([content],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href)}
function csvCell(v){const s=String(v==null?'':v); return /[",\n;]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function toCSV(headers,rows){const head=headers.map(csvCell).join(','); const body=rows.map(r=>r.map(csvCell).join(',')).join('\n'); return '\uFEFF'+head+'\n'+body}
function downloadCSV(filename,csv){const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href)}
function fichaCSV(p){const s=playerSportStats(p.id); const yn=v=>v==='true'?'Sí':'No'; const rows=[['ID',p.code||''],['Nombre',`${p.name} ${p.apellidos}`.trim()],['Numero',p.number||''],['Categoria',p.category||''],['Posicion',p.position||''],['Talla',p.size||''],['Fecha de nacimiento',p.birthDate||''],['Capitan',yn(p.captain)],['Tutor',p.tutor||''],['Telefono',p.phone||''],['Contacto emergencia',p.emergencyContact||''],['Tel emergencia',p.emergencyPhone||''],['Tipo de sangre',p.blood||''],['Alergias',p.allergies||''],['Mensualidad',p.monthlyFee||''],['Beca',yn(p.scholarship)],['Tipo de beca',p.scholarshipType||''],['Acta de nacimiento',yn(p.docActa)],['CURP',yn(p.docCurp)],['Comprobante de estudios',yn(p.docStudies)],['Entrenamientos registrados',s.trainings],['Asistencias',s.present],['Retardos',s.late],['Ausencias',s.absent],['Porcentaje de asistencia',s.pct+'%'],['Partidos jugados',s.played],['Goles',s.goals],['Asistencias de gol',s.assists],['Amarillas',s.yellow],['Rojas',s.red],['Semifinales',s.semis],['Finales',s.finals],['Ultima asistencia',s.lastAtt||''],['Ultimo partido',s.lastMatch||''],['Actualizado',new Date().toLocaleString('es-MX')]]; return toCSV(['Campo','Valor'],rows)}
function contabRows(){const all=repos.payments.list(); const f=state.acc||{type:'all',month:dateOnly().slice(0,7)}; let rows=all.filter(p=>!f.month||dateOnly(p.date).slice(0,7)===f.month); if(f.type==='income')rows=rows.filter(isIncome); if(f.type==='expense')rows=rows.filter(p=>!isIncome(p)); return rows.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''))}
function exportContabCSV(){const rows=contabRows(); if(!rows.length)return toast('No hay movimientos para exportar.'); const csv=toCSV(['Fecha','Movimiento','Categoria','Concepto','Jugador/Proveedor','Metodo','Referencia','Monto','Responsable'],rows.map(p=>[p.date,isIncome(p)?'Ingreso':'Egreso',p.category||'',p.concept||'',p.playerName||p.supplierName||'',p.method||'',p.reference||'',num(p.amount),p.responsibleUser||''])); const f=state.acc||{}; downloadCSV(`Movimientos_${f.month||'todos'}.csv`,csv); toast('CSV de movimientos descargado')}

function globalSearch(q){q=norm(q); if(q.length<2)return []; const groups=[]; const push=(title,items)=>{if(items.length)groups.push({title,items})};
 push('Jugadores',repos.players.list().filter(p=>norm(`${p.name} ${p.apellidos} ${p.code} ${p.number} ${p.category} ${p.position} ${p.tutor} ${p.phone}`).includes(q)).slice(0,6).map(p=>({ic:'jugadores',label:`${p.number?'#'+p.number+' · ':''}${p.name} ${p.apellidos}`,sub:`${p.category||'—'}${p.position?' · '+p.position:''} · ${p.code||''}`,go:'jugadores'})));
 push('Talento',repos.prospects.list().filter(p=>norm(`${p.name} ${p.category} ${p.tutor} ${p.phone}`).includes(q)).slice(0,6).map(p=>({ic:'scouting',label:p.name,sub:`${p.category||'Por definir'} · ${p.status||''}`,go:'scouting'})));
 push('Cobros',repos.payments.list().filter(p=>norm(`${p.playerName} ${p.concept} ${p.reference}`).includes(q)).slice(0,6).map(p=>({ic:'taquilla',label:`${p.concept} · ${money(p.amount)}`,sub:`${p.playerName||'—'} · ${p.date}`,go:'taquilla'})));
 push('Eventos',repos.events.list().filter(e=>norm(`${e.title} ${e.type} ${e.place} ${e.rival}`).includes(q)).slice(0,6).map(e=>({ic:'calendario',label:e.title||e.rival||'Evento',sub:`${e.type||''} · ${e.date||''}`,go:'calendario'})));
 return groups}

function renderInicio(){const c=counts(); const month=dateOnly().slice(0,7); const ps=repos.payments.list().filter(p=>dateOnly(p.date).slice(0,7)===month); const mt=cashTotals(ps); const goals=topList('goals'); const assists=topList('assists'); const att=topList('attendance'); return `<div class="hero"><h1>Bienvenido al vestidor, ${escapeHtml(state.session?.name||'Tanner')}</h1><p>Control del club · ${syncLabel(state.syncStatus)}</p></div>${(()=>{const a=sponsorsToRenew(); return a.length?`<div class="card" style="border-left:4px solid var(--orange);margin-bottom:14px"><div class="between"><h3 style="margin:0">Patrocinios por renegociar (${a.length})</h3><button class="btn ghost" data-nav="patrocinadores">Ver</button></div><p class="muted" style="margin-top:6px">${a.slice(0,3).map(({s,r})=>escapeHtml(s.name)+' ('+(r.state==='overdue'?'vencido':r.days+' días')+')').join(' · ')}</p></div>`:''})()}<div class="grid cols-4">${kpi('Plantilla','jugadores',c.players)}${kpi('Talento','scouting',c.prospects)}${kpi('Ingresos del mes','taquilla',money(mt.income))}${kpi('Balance del mes','contabilidad','<span class="'+(mt.balance>=0?'mv-in':'mv-out')+'">'+money(mt.balance)+'</span>')}</div><p class="muted" style="margin-top:8px">Ingresos del mes — Efectivo: <strong>${money(methodIncome(ps,'Efectivo'))}</strong> · Transferencia: <strong>${money(methodIncome(ps,'Transferencia'))}</strong></p><div class="grid cols-2" style="margin-top:14px"><div class="card"><h3>Caja rápida</h3><div class="cash-actions" style="margin:0"><button class="cash-btn cash-in" data-form="cobro">${icon('taquilla')}<b>Cobrar</b></button><button class="cash-btn cash-out" data-form="pago">${icon('contabilidad')}<b>Pagar</b></button></div></div><div class="card"><h3>Accesos rápidos</h3><div class="row"><button class="btn" data-form="player">${icon('jugadores')} Nuevo jugador</button><button class="btn secondary" data-nav="asistencia">${icon('asistencia')} Asistencia</button><button class="btn secondary" data-nav="convocatoria">${icon('convocatoria')} Convocar</button></div><p class="muted" style="margin-top:12px">Última sync: ${c.lastSync?.at?new Date(c.lastSync.at).toLocaleString('es-MX'):'Pendiente'}</p><button class="btn secondary" data-action="syncNow">${icon('sync')} Sincronizar ahora</button></div></div><div class="grid cols-3" style="margin-top:14px"><div class="card"><h3>Goleo</h3>${lead(goals,'g')}</div><div class="card"><h3>Asistencias de gol</h3>${lead(assists,'a')}</div><div class="card"><h3>Mejor asistencia</h3>${lead(att.filter(x=>x.val>0),'pct')}</div></div>`}

</span></div><h3 style="margin-top:14px">Historial deportivo</h3><div class="grid cols-4">${stat(s.pct+'%','Asistencia')}${stat(s.present,'Entrenamientos')}${stat(s.played,'Partidos')}${stat(s.goals,'Goles')}${stat(s.assists,'Asist. gol')}${stat(s.late,'Retardos')}${stat(s.semis,'Semifinales')}${stat(s.finals,'Finales')}</div><h3 style="margin-top:14px">Resumen</h3><div class="grid cols-3">${stat(money(paid),'Cobrado')}${stat(s.lastAtt||'—','Últ. asistencia')}${stat(s.lastMatch||'—','Últ. partido')}</div><div class="row" style="margin-top:16px"><button class="btn" data-ficha-copy="${id}">${icon('copy')} Copiar ficha</button><button class="btn secondary" data-ficha-dl="${id}">Descargar TXT</button><button class="btn secondary" data-ficha-csv="${id}">Descargar CSV</button><button class="btn ghost" data-edit-player="${id}">Editar datos</button>${['Presidencia','Admin'].includes(state.session?.role)?`<button class="btn ghost" data-del-player="${id}" style="color:var(--red)">Eliminar</button>`:''}</div></div>`; $('#modal').classList.remove('hidden')}
function renderJugadores(){const all=repos.players.list(); const cats=getCategories(); const sel=state.plCat||''; const q=norm(state.plSearch||''); const toolbar=`<div class="card" style="margin-bottom:12px"><input id="searchPlayers" placeholder="Buscar por nombre, número, código, posición o tutor" data-filter="players" aria-label="Buscar jugador" value="${escapeHtml(state.plSearch||'')}"><div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap"><button class="btn secondary" data-action="openCategories">Editar categorías</button><select id="expCat" style="min-width:160px;flex:1"><option value="">Todas las categorías</option>${cats.map(c=>`<option ${sel===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select><button class="btn secondary" data-action="exportPlayers">${icon('copy')} CSV</button></div></div>`; const chips=`<div class="chip-row"><button class="chip ${!sel?'on':''}" data-pl-cat="">Todas (${all.length})</button>${cats.map(c=>{const n=all.filter(p=>norm(p.category)===norm(c)).length; return `<button class="chip ${sel===c?'on':''}" data-pl-cat="${escapeHtml(c)}">${escapeHtml(c)} · ${n}</button>`}).join('')}</div>`; let body; if(!all.length){body=emptyState('jugadores','Aún no hay jugadores en la plantilla. Registra el primero o espera la sincronización.','<button class="btn" data-form="player">Registrar jugador</button>')} else if(q){const f=all.filter(p=>norm(`${p.name} ${p.apellidos} ${p.code} ${p.number} ${p.category} ${p.position} ${p.tutor}`).includes(q)); body=`<div class="card"><h3 style="margin:0 0 8px">Resultados (${f.length})</h3>${f.length?playersTable(f):'<div class="empty">Sin coincidencias.</div>'}</div>`} else if(sel){body=categoryBlock(sel,all.filter(p=>norm(p.category)===norm(sel)))} else {body=cats.map(c=>{const list=all.filter(p=>norm(p.category)===norm(c)); return list.length?categoryBlock(c,list):''}).join(''); const sinCat=all.filter(p=>!p.category); if(sinCat.length)body+=categoryBlock('Sin categoría',sinCat); if(!body)b ad><tbody>${rows.map(p=>`<tr><td><div class="name-cell">${avatarHtml(p,'sm')}<div><strong>${escapeHtml(p.name+' '+p.apellidos)}</strong>${guestSet.has(p.id)?` <span class="badge warn">Invitado · ${escapeHtml(p.category||'')}</span> <button class="btn ghost mini" data-del-guest="${p.id}">Quitar</button>`:''}</div></div></td><td style="text-align:center"><input type="checkbox" data-a="${p.id}" checked style="width:auto" aria-label="Asistió ${escapeHtml(p.name)}"></td><td><select data-pu="${p.id}"><option>Puntual</option><option>Tarde</option></select></td><td><input type="time" data-ar="${p.id}" style="min-width:108px"></td><td><select data-un="${p.id}"><option>Completo</option><option>Incompleto</option></select></td><td><select data-at="${p.id}"><option>Normal</option><option>Destacada</option><option>Baja</option></select></td><td style="text-align:center"><input type="checkbox" data-in="${p.id}" style="width:auto"></td><td style="text-align:center"><input type="checkbox" data-av="${p.id}" style="width:auto"></td><td><input data-pk="${p.id}" placeholder="Mamá / papá / tutor" style="min-width:130px"></td><td><input data-ob="${p.id}" placeholder="Notas" style="min-width:140px"></td></tr>`).join('')}</tbody></table></div><div class="row" style="margin-top:14px"><button class="btn" data-action="saveSession">${icon('send')} Guardar sesión</button><span class="muted">Se guarda y sincroniza automáticamente.</span></div>`:emptyState('jugadores','No hay jugadores en esta categoría. Registra jugadores o cambia de categoría.','<button class="btn" data-nav="jugadores">Ir a Plantilla</button>')}<div class="card" style="margin-top:16px"><h3>Sesiones recientes</h3>${recentSessions()}</div>`}
function ensureMatch(){if(state.match)return; const cats=playerCategories(); const withP=cats.find(c=>repos.players.list().some(p=>p.category===c)); state.match={id:uid('match'),date:dateOnly(),category:withP||cats[0]||'',opponent:'',tournament:'',phase:'Amistoso',location:'',goalsFor:0,goalsAgainst:0,guests:[]}}
function renderMatch(){ensureMatch(); const m=state.match; const cats=playerCategories(); const players=repos.players.list().filter(p=>!m.category||p.category===m.category); const guestIds=m.guests||[]; const guests=repos.players.list().filter(p=>guestIds.includes(p.id)&&p.category!==m.category); const rows=[...players,...guests]; const guestSet=new Set(guests.map(p=>p.id)); const phases=['Amistoso','Jornada regular','Cuartos','Semifinal','Final','Torneo especial','Otro']; return `<div class="row" style="justify-content:flex-end;margin-bottom:8px"><button class="btn secondary" data-action="inviteGuest">${icon('plus')} Invitar jugador</button></div><div class="chip-row">${cats.length?cats.map(c=>`<button class="chip ${c===m.category?'on':''}" data-match-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join(''):'<span class="muted">Registra jugadores con categoría.</span>'}</div><div class="card"><div class="form-grid"><div><label>Fecha *</label><input type="date" id="mDate" value="${escapeHtml(m.date)}"></div><div><label>Rival *</label><input id="mOpp" value="${escapeHtml(m.opponent)}" placeholder="Atlético León"></div><div><label>Torneo</label><input id="mTour" value="${escapeHtml(m.tournament)}" placeholder="Liga / Copa"></div><div><label>Fase</label><select id="mPhase">${phases.map(f=>`<option ${m.phase===f?'selected':''}>${f}</option>`).join('')}</select></div><div><label>Sede</label><input id="mLoc" value="${escapeHtml(m.location)}" placeholder="Tannery City Park"></div><div><label>Marcador (a favor / en contra)</label><div class="row" style="flex-wrap:nowrap;gap:6px"><input id="mGF" type="number" min="0" value="${m.goalsFor}" style="text-align:center"><input id="mGA" type="number" min="0" value="${m.goalsAgainst}" style="text-align:center"></div></div></div></div>${rows.length?`<div class="table-wrap"><table class="stat-grid"><thead><tr><th>Jugador</th><th>Jugó</th><th>Titular</th><th>Min</th><th>Goles</th><th>Asist</th><th>Amar</th><th>Roja</th></tr></thead><tbody>${rows.map(p=>`<tr><td><div class="name-cell">${avatarHtml(p,'sm')}<div><strong>${escapeHtml(p.name+' '+p.apellidos)}</strong>${guestSet.has(p.id)?` <span class="badge warn">Invitado · ${escapeHtml(p.category||'')}</span> <button class="btn ghost mini" data-del-guest="${p.id}">Quitar</button>`:''}</div></div></td><td style="text-align:center"><input type="checkbox" data-mp="${p.id}" checked style="width:auto"></td><td style="text-align:center"><input type="checkbox" data-ms="${p.id}" style="width:auto"></td><td><input type="number" min="0" data-mm="${p.id}" placeholder="0"></td><td><input type="number" min="0" data-mg="${p.id}" placeholder="0"></td><td><input type="number" min="0" data-ma="${p.id}" placeholder="0"></td><td><input type="number" min="0" data-my="${p.id}" placeholder="0"></td><td><input type="number" min="0" data-mr="${p.id}" placeholder="0"></td></tr>`).join('')}</tbody></table></div><div class="row" style="margin-top:14px"><button class="btn" data-action="saveMatch">${icon('send')} Guardar partido</button><span class="muted">Guarda el partido y la estadística de cada Tanner.</span></div>`:emptyState('jugadores','No hay jugadores en esta categoría.','<button class="btn" data-nav="jugadores">Ir a Plantilla</button>')}<div class="card" style="margin-top:16px"><h3>Partidos recientes</h3>${recentMatches()}</div>`}
function recentMatches(){const ms=repos.matches.list().slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8); if(!ms.length)return '<div class="empty">Aún no hay partidos.</div>'; return `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Categoría</th><th>Rival</th><th>Fase</th><th>Marcador</th></tr></thead><tbody>${ms.map(m=>`<tr><td>${escapeHtml(m.date)}</td><td>${escapeHtml(m.category)}</td><td>${escapeHtml(m.opponent)}</td><td>${escapeHtml(m.phase)}</td><td><strong>${num(m.goalsFor)} - ${num(m.goalsAgainst)}</strong></td></tr>`).join('')}</tbody></table></div>`}
function setAttTab(t){state.attTab=t; renderModule('asistencia')}
function pickMatchCat(c){ensureMatch(); state.match.category=c; renderModule('asistencia')}
function saveMatch(){ensureMatch(); const opp=text($('#mOpp')?.value); if(!opp)return toast('Escribe el rival.'); const mid=uid('match'); const gf=num($('#mGF')?.value),ga=num($('#mGA')?.value); repos.matches.upsert({id:mid,date:$('#mDate').value,category:state.match.category,opponent:opp,tournament:$('#mTour')?.value,phase:$('#mPhase').value,location:$('#mLoc')?.value,goalsFor:gf,goalsAgainst:ga,result:`${gf}-${ga}`}); $$('[data-mp]').forEach(ch=>{const id=ch.dataset.mp; const p=repos.players.find(id); if(!p)return; repos.matchStats.upsert({matchId:mid,playerId:id,playerName:p.name+' '+p.apellidos,attended:ch.checked,starter:$(`[data-ms="${id}"]`)?.checked,minutesPlayed:num($(`[data-mm="${id}"]`)?.value),goals:num($(`[data-mg="${id}"]`)?.value),assists:num($(`[data-ma="${id}"]`)?.value),yellowCards:num($(`[data-my="${id}"]`)?.value),redCards:num($(`[data-mr="${id}"]`)?.value)})}); state.match=null; toast('Partido guardado'); renderModule('asistencia')}
function attStatsHtml(total,pres,punt,tard,unif,les){const pct=total?Math.round(pres/total*100):0; return `<div class="sess-stat"><b>${pres}/${total}</b><span>Presentes</span></div><div class="sess-stat"><b>${pct}%</b><span>Asistencia</span></div><div class="sess-stat"><b>${punt}</b><span>Puntuales</span></div><div class="sess-stat"><b>${tard}</b><span>Tardanzas</span></div><div class="sess-stat"><b>${unif}</b><span>Uniforme</span></div><div class="sess-stat"><b>${les}</b><span>Lesiones</span></div>`}
function updateAttStats(){const box=$('#attStats'); if(!box)return; const checks=$$('[data-a]'); const total=checks.length; let pres=0,punt=0,tard=0,unif=0,les=0; checks.forEach(ch=>{const id=ch.dataset.a; if(ch.checked)pres++; const pu=$(`[data-pu="${id}"]`)?.value; if(ch.checked&&pu==='Puntual')punt++; if(ch.checked&&pu==='Tarde')tard++; if($(`[data-un="${id}"]`)?.value==='Completo'&&ch.checked)unif++; if($(`[data-in="${id}"]`)?.checked)les++}); box.innerHTML=attStatsHtml(total,pres,punt,tard,unif,les)}
function recentSessions(){const rows=repos.attendance.list(); if(!rows.length)return '<div class="empty">Aún no hay sesiones guardadas.</div>'; const byS={}; rows.forEach(r=>{const k=r.sessionId||(r.date+'|'+r.category); (byS[k]||(byS[k]={date:r.date,category:r.category,coach:r.coach,type:r.type,total:0,pres:0})); byS[k].total++; if(r.status==='Presente')byS[k].pres++}); const list=Object.values(byS).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8); return `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Categoría</th><th>Tipo</th><th>Entrenador</th><th>Presentes</th></tr></thead><tbody>${list.map(s=>`<tr><td>${escapeHtml(s.date)}</td><td>${escapeHtml(s.category||'—')}</td><td>${escapeHtml(s.type||'—')}</td><td>${escapeHtml(s.coach||'—')}</td><td><strong>${s.pres}/${s.total}</strong></td></tr>`).join('')}</tbody></table></div>`}
function newSession(){state.sess=null; ensureSess(); renderModule('asistencia')}
function captureSess(){if(!state.sess)return; if($('#sFecha'))state.sess.date=$('#sFecha').value; if($('#sCoach'))state.sess.coach=$('#sCoach').value; if($('#sType'))state.sess.type=$('#sType').value; if($('#sTime'))state.sess.time=$('#sTime').value; if($('#sField'))state.sess.field=$('#sField').value}
function captureMatch(){if(!state.match)return; if($('#mDate'))state.match.date=$('#mDate').value; if($('#mOpp'))state.match.opponent=$('#mOpp').value; if($('#mTour'))state.match.tournament=$('#mTour').value; if($('#mPhase'))state.match.phase=$('#mPhase').value; if($('#mLoc'))state.match.location=$('#mLoc').value; if($('#mGF'))state.match.goalsFor=num($('#mGF').value); if($('#mGA'))state.match.goalsAgainst=num($('#mGA').value)}
function activeSess(){return state.attTab==='match'?state.match:state.sess}
function captureActive(){state.attTab==='match'?captureMatch():captureSess()}
function openInviteGuest(){captureActive(); const ss=activeSess(); if(!ss)return; const sel=ss.category; const taken=new Set(ss.guests||[]); const others=repos.players.list().filter(p=>p.category!==sel&&!taken.has(p.id)); const cats=[...new Set(others.map(p=>p.category||'Sin categoría'))]; const body=others.length?cats.map(c=>`<div style="margin-top:10px"><strong style="font-family:var(--disp)">${escapeHtml(c)}</strong>${others.filter(p=>(p.category||'Sin categoría')===c).map(p=>`<div class="roster-row"><span>${p.number?'#'+escapeHtml(p.number)+' ':''}${escapeHtml(p.name+' '+p.apellidos)}</span><button class="btn ghost mini" data-add-guest="${p.id}">Agregar</button></div>`).join('')}</div>`).join(''):'<div class="empty">No hay jugadores de otras categorías.</div>'; $('#modal').innerHTML=`<div class="modal-card"><div class="between"><h2>Invitar jugador</h2><button class="btn ghost" data-action="closeModal">Cerrar</button></div><p class="muted">Se le tomará asistencia en ${escapeHtml(sel||'esta sesión')} sin cambiarle su categoría.</p>${body}</div>`; $('#modal').classList.remove('hidden')}
function addGuest(id){const ss=activeSess(); if(!ss)return; ss.guests=[...new Set([...(ss.guests||[]),id])]; closeModal(); renderModule('asistencia')}
function delGuest(id){captureActive(); const ss=activeSess(); if(ss)ss.guests=(ss.guests||[]).filter(g=>g!==id); renderModule('asistencia')}
function softDeletePlayer(id){if(!['Presidencia','Admin'].includes(state.session?.role))return toast('Solo Presidencia puede eliminar jugadores.'); const p=repos.players.find(id); if(!p)return; repos.players.upsert({...p,deleted:true}); closeModal(); renderModule('jugadores'); toast('Jugador eliminado')}
function openDeleteConfirm(id){if(!['Presidencia','Admin'].includes(state.session?.role))return toast('Solo Presidencia puede eliminar jugadores.'); const p=repos.players.find(id); if(!p)return; $('#modal').innerHTML=`<div class="modal-card"><div class="between"><h2>Eliminar jugador</h2><button class="btn ghost" data-action="closeModal">Cerrar</button></div><p>Vas a eliminar a <strong>${escapeHtml(p.name+' '+p.apellidos)}</strong> de la plantilla. Se quita de la app y, al sincronizar, se marca como eliminado en Google Sheets. No se puede deshacer desde la app.</p><div class="row" style="margin-top:10px"><button class="btn" style="background:var(--red)" data-del-confirm="${id}">Sí, eliminar</button><button class="btn secondary" data-ficha="${id}">Cancelar</button></div></div>`; $('#modal').classList.remove('hidden')}
function confirmDeletePlayer(id){softDeletePlayer(id)}
function pickAttCat(cat){ensureSess(); state.sess.category=cat; renderModule('asistencia')}
function saveSession(){const coach=text($('#sCoach')?.value); if(!coach)return toast('Escribe el nombre del entrenador.'); const sid=uid('sess'); const base={sessionId:sid,date:$('#sFecha').value,category:$('#sCat').value,coach,type:$('#sType').value,time:$('#sTime').value,field:text($('#sField')?.value)}; const checks=$$('[data-a]'); if(!checks.length)return toast('No hay jugadores para guardar.'); checks.forEach(ch=>{const id=ch.dataset.a; const p=repos.players.find(id); if(!p)return; repos.attendance.upsert({...base,playerId:id,playerName:p.name+' '+p.apellidos,status:ch.checked?'Presente':'Ausente',punctuality:ch.checked?($(`[data-pu="${id}"]`)?.value||''):'',arrival:$(`[data-ar="${id}"]`)?.value||'',uniform:$(`[data-un="${id}"]`)?.value||'',attitude:$(`[data-at="${id}"]`)?.value||'',injury:$(`[data-in="${id}"]`)?.checked?'Sí':'',notice:$(`[data-av="${id}"]`)?.checked?'Sí':'',pickup:$(`[data-pk="${id}"]`)?.value||'',notes:$(`[data-ob="${id}"]`)?.value||''})}); state.sess=null; toast('Sesión guardada'); renderModule('asistencia')}
function renderTaquilla(){const ps=repos.payments.list(); const today=dateOnly(); const tdy=ps.filter(p=>dateOnly(p.date)===today); const t=cashTotals(tdy); const recent=ps.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,12); return `<div class="between"><h2>Taquilla</h2><div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn secondary" data-action="corteCaja">${icon('copy')} Corte de caja (PDF)</button><span class="status-pill"><span class="dot ${state.syncStatus==='Sincronizado'?'':'warn'}"></span><span class="status-text">${syncLabel(state.syncStatus)}</span></span></div></div><div class="cash-actions"><button class="cash-btn cash-in" data-form="cobro" aria-label="Cobrar">${icon('taquilla')}<b>Cobrar</b><span>Entra dinero al club</span></button><button class="cash-btn cash-out" data-form="pago" aria-label="Pagar">${icon('contabilidad')}<b>Pagar</b><span>Sale dinero del club</span></button></div><div class="grid cols-3"><div class="card"><div class="kpi-label">${icon('taquilla')} Ingresos del día</div><div class="bal pos">${money(t.income)}</div></div><div class="card"><div class="kpi-label">${icon('contabilidad')} Egresos del día</div><div class="bal neg">${money(t.expense)}</div></div><div class="card"><div class="kpi-label">${icon('contabilidad')} Caja del día</div><div class="bal ${t.balance>=0?'pos':'neg'}">${money(t.balance)}</div></div></div><div class="card" style="margin-top:14px"><h3>Caja del día por método</h3>${methodTable(tdy)}</div><div class="card" style="margin-top:14px"><h3>Últimos movimientos</h3>${recent.length?movementsTable(recent):emptyState('taquilla','Aún no hay movimientos. Usa Cobrar o Pagar.')}</div>`}
function movementsTable(rows){return `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Movimiento</th><th>Categoría</th><th>Concepto</th><th>Quién</th><th>Método</th><th>Monto</th></tr></thead><tbody>${rows.map(p=>{const inc=isIncome(p); return `<tr><td>${escapeHtml(p.date)}</td><td><span class="badge ${inc?'pill-in':'pill-out'}">${inc?'Ingreso':'Egreso'}</span></td><td>${escapeHtml(p.category||'—')}</td><td>${escapeHtml(p.concept)}</td><td>${escapeHtml(p.playerName||p.supplierName||'—')}</td><td>${escapeHtml(p.method)}</td><td class="${inc?'mv-in':'mv-out'}">${inc?'+':'-'} ${money(p.amount)}</td></tr>`}).join('')}</tbody></table></div>`}
function renderContabilidad(){const all=repos.payments.list(); if(!state.acc)state.acc={type:'all',month:dateOnly().slice(0,7)}; const f=state.acc; let rows=all.filter(p=>!f.month||dateOnly(p.date).slice(0,7)===f.month); if(f.type==='income')rows=rows.filter(isIncome); if(f.type==='expense')rows=rows.filter(p=>!isIncome(p)); const t=cashTotals(rows); const byCat=(inc)=>Object.entries(rows.filter(p=>isIncome(p)===inc).reduce((a,p)=>{const k=p.category||'Sin categoría';a[k]=(a[k]||0)+num(p.amount);return a},{})).sort((a,b)=>b[1]-a[1]); return `<div class="between"><h2>Contabilidad</h2><button class="btn secondary" data-action="exportContab">${icon('copy')} Exportar CSV</button></div><div class="card" style="margin-bottom:14px"><div class="row"><div style="min-width:150px"><label>Mes</label><input type="month" id="accMonth" data-acc="month" value="${f.month}"></div><div style="min-width:150px"><label>Movimiento</label><select id="accType" data-acc="type"><option value="all" ${f.type==='all'?'selected':''}>Todos</option><option value="income" ${f.type==='income'?'selected':''}>Ingresos</option><option value="expense" ${f.type==='expense'?'selected':''}>Egresos</option></select></div></div></div><div class="grid cols-3"><div class="card"><div class="kpi-label">Ingresos</div><div class="bal pos">${money(t.income)}</div></div><div class="card"><div class="kpi-label">Egresos</div><div class="bal neg">${money(t.expense)}</div></div><div class="card"><div class="kpi-label">Balance</div><div class="bal ${t.balance>=0?'pos':'neg'}">${money(t.balance)}</div></div></div><div class="grid cols-2" style="margin-top:14px"><div class="card"><h3>Ingresos por categoría</h3>${miniRows(byCat(true))}</div><div class="card"><h3>Egresos por categoría</h3>${miniRows(byCat(false))}</div></div><div class="card" style="margin-top:14px"><h3>Por método (efectivo, transferencia…)</h3>${methodTable(rows)}</div><div class="card" style="margin-top:14px"><h3>Movimientos del mes</h3>${rows.length?movementsTable(rows.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,40)):emptyState('contabilidad','Sin movimientos en este filtro.')}</div>`}
function setAcc(k,v){if(!state.acc)state.acc={type:'all',month:dateOnly().slice(0,7)}; state.acc[k]=v; renderModule('contabilidad')}
function miniRows(rows){return rows.length?rows.map(([k,v])=>`<div class="between" style="border-bottom:1px solid var(--line);padding:8px 0;margin:0"><span>${escapeHtml(k)}</span><strong>${money(v)}</strong></div>`).join(''):'<div class="empty">Sin datos</div>'}
function simpleModule(entity,title,fields,ic){const rows=repos[entity].list(); return `<div class="between"><h2>${title}</h2><button class="btn" data-form="${entity}">${icon(ic)} Nuevo</button></div>${rows.length?listTable(rows,fields):emptyState(ic,'Módulo listo. Aún no hay registros.','<button class="btn" data-form="'+entity+'">Crear el primero</button>')}`}
function sponsorRenew(s){if(!s.endDate)return {state:'none',days:null}; const end=new Date(s.endDate+'T00:00:00'); if(isNaN(end))return {state:'none',days:null}; const today=new Date(dateOnly()+'T00:00:00'); const days=Math.round((end-today)/86400000); if(days<0)return {state:'overdue',days}; if(days<=90)return {state:'soon',days}; return {state:'ok',days}}
function sponsorBadge(s){const r=sponsorRenew(s); if(r.state==='overdue')return '<span class="badge bad">Vencido hace '+Math.abs(r.days)+' d</span>'; if(r.state==='soon')return '<span class="badge warn">Renovar en '+r.days+' d</span>'; if(r.state==='ok')return '<span class="badge good">Vigente ('+r.days+' d)</span>'; return '<span class="badge">Sin fecha fin</span>'}
function sponsorsToRenew(){return repos.sponsors.list().map(s=>({s,r:sponsorRenew(s)})).filter(x=>x.r.state==='soon'||x.r.state==='overdue').sort((a,b)=>(a.r.days||0)-(b.r.days||0))}
function renderPatrocinadores(){const rows=repos.sponsors.list().slice().sort((a,b)=>(a.endDate||'').localeCompare(b.endDate||'')); const alerts=sponsorsToRenew(); return `<div class="between"><h2>Patrocinadores</h2><div class="row"><button class="btn secondary" data-action="openCatalog">Editar catálogo</button><button class="btn" data-form="sponsor">${icon('patrocinadores')} Nuevo patrocinador</button></div></div>${alerts.length?`<div class="card" style="border-left:4px solid var(--orange);margin-bottom:14px"><h3>Contratos por renegociar</h3>${alerts.map(({s,r})=>`<div class="lead-row"><span><strong>${escapeHtml(s.name)}</strong> · vence ${escapeHtml(s.endDate)}</span>${r.state==='overdue'?'<span class="badge bad">Vencido</span>':'<span class="badge warn">'+r.days+' días</span>'}</div>`).join('')}<p class="muted" style="margin-top:8px">Aviso automático 3 meses antes del fin de contrato.</p></div>`:''}${rows.length?`<div class="table-wrap"><table><thead><tr><th>Patrocinador</th><th>Paquete</th><th>Cierre</th><th>Vigencia</th><th>Activos</th><th>Estatus</th><th></th></tr></thead><tbody>${rows.map(s=>{const on=(s.assets||[]).filter(a=>a.on!==false).length; return `<tr><td><strong>${escapeHtml(s.name)}</strong>${s.amount?'<div class="muted" style="font-size:12px">'+money(s.amount)+'</div>':''}</td><td>${escapeHtml(s.tier||'—')}</td><td>${escapeHtml(s.closedDate||'—')}</td><td>${escapeHtml(s.startDate||'?')} → ${escapeHtml(s.endDate||'?')} ${sponsorBadge(s)}</td><td>${on} activos</td><td><span class="badge">${escapeHtml(s.status)}</span></td><td><div class="row" style="flex-wrap:nowrap;gap:4px"><button class="btn ghost" data-sponsor="${s.id}">Ver</button><button class="btn ghost" data-edit-sponsor="${s.id}">Editar</button><button class="btn ghost" data-sponsor-pdf="${s.id}">PDF</button></div></td></tr>`}).join('')}</tbody></table></div>`:emptyState('patrocinadores','Aún no hay patrocinadores. Registra el primero cuando cierres un trato.','<button class="btn" data-form="sponsor">Nuevo patrocinador</button>')}`}
function sponsorAssetsForm(sel){const map={}; (sel||[]).forEach(a=>{map[a.id]=a}); const cat=getAssetCatalog(); const catalog=cat.map(a=>{const cur=map[a.id]; const on=cur?cur.on!==false:false; return `<div class="roster-row"><label style="display:flex;align-items:center;gap:8px;margin:0;flex:1"><input type="checkbox" data-asset="${a.id}" ${on?'checked':''} style="width:auto"> ${escapeHtml(a.name)}</label><input data-asset-note="${a.id}" value="${escapeHtml(cur?.note||'')}" placeholder="Detalle / frecuencia" style="max-width:190px"></div>`}).join(''); const custom=(sel||[]).filter(a=>a.custom).map(a=>a.name).join('\n'); return `<div class="card" style="margin-top:8px"><h3 style="margin:0">Activos digitales del patrocinador</h3><p class="muted" style="margin-top:4px">Marca los activos a los que tiene acceso. Para agregar o quitar activos del catálogo usa "Editar catálogo" en Patrocinadores.</p>${catalog}<div style="margin-top:10px"><label>Otros activos (uno por línea)</label><textarea id="f_assets_custom" placeholder="Ej. Naming de gradas, valla 3x2...">${escapeHtml(custom)}</textarea></div></div>`}
function saveSponsor(id){const name=text($('#f_name').value); if(!name)return vErr('Escribe el nombre del patrocinador.'); const assets=[]; getAssetCatalog().forEach(a=>{if($(`[data-asset="${a.id}"]`)?.checked)assets.push({id:a.id,name:a.name,on:true,note:text($(`[data-asset-note="${a.id}"]`)?.value)})}); text($('#f_assets_custom')?.value).split('\n').map(s=>s.trim()).filter(Boolean).forEach((line,i)=>assets.push({id:'CUSTOM-'+(i+1),name:line,on:true,custom:true,note:''})); repos.sponsors.upsert({id:id||undefined,name,tier:$('#f_tier')?.value,contactName:$('#f_contact')?.value,phone:$('#f_phone')?.value,email:$('#f_email')?.value,amount:num($('#f_amount')?.value),closedDate:$('#f_closed')?.value,startDate:$('#f_start')?.value,endDate:$('#f_end')?.value,status:$('#f_status')?.value,assets,notes:$('#f_notes')?.value}); closeModal(); renderModule('patrocinadores'); toast('Patrocinador guardado')}
function openSponsor(id){const s=repos.sponsors.find(id); if(!s)return; const r=sponsorRenew(s); const on=(s.assets||[]).filter(a=>a.on!==false); const renewDate=s.endDate?dateOnly(new Date(new Date(s.endDate+'T00:00:00').getTime()-90*86400000).toISOString()):''; $('#modal').innerHTML=`<div class="modal-card"><div class="between"><h2>${escapeHtml(s.name)}</h2><button class="btn ghost" data-action="closeModal">Cerrar</button></div><div class="muted" style="margin-bottom:8px">${escapeHtml(s.tier||'Patrocinador')} · ${escapeHtml(s.status)} ${sponsorBadge(s)}</div><div class="grid cols-3"><div class="ficha-stat"><b>${escapeHtml(s.closedDate||'—')}</b><span>Cierre</span></div><div class="ficha-stat"><b>${escapeHtml(s.startDate||'—')}</b><span>Inicio</span></div><div class="ficha-stat"><b>${escapeHtml(s.endDate||'—')}</b><span>Fin</span></div></div>${s.endDate?`<p class="muted" style="margin-top:10px">Alerta de renegociación: ${escapeHtml(renewDate)} (3 meses antes). ${r.state==='soon'?'<strong style="color:var(--orange)">Toca renegociar pronto.</strong>':r.state==='overdue'?'<strong style="color:var(--red)">Contrato vencido.</strong>':''}</p>`:''}<h3 style="margin-top:14px">Activos con acceso (${on.length})</h3>${on.length?`<div class="table-wrap"><table><thead><tr><th>Activo</th><th>Detalle</th></tr></thead><tbody>${on.map(a=>`<tr><td>${escapeHtml(a.name)}</td><td>${escapeHtml(a.note||'')}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">Sin activos asignados todavía.</div>'}${s.contactName||s.phone||s.email?`<p class="muted" style="margin-top:10px">Contacto: ${escapeHtml(s.contactName||'')} ${s.phone?'· '+escapeHtml(s.phone):''} ${s.email?'· '+escapeHtml(s.email):''}</p>`:''}<div class="row" style="margin-top:16px"><button class="btn secondary" data-sponsor-pdf="${id}">Descargar PDF</button><button class="btn" data-edit-sponsor="${id}">Editar</button></div></div>`; $('#modal').classList.remove('hidden')}
function openCatalog(){const cat=getAssetCatalog(); $('#modal').innerHTML=`<div class="modal-card"><div class="between"><h2>Catálogo de activos digitales</h2><button class="btn ghost" data-action="closeModal">Cerrar</button></div><p class="muted">Agrega, renombra o quita los activos que el club ofrece. Esto alimenta la ficha de cada patrocinador.</p><div id="catList">${cat.map(a=>`<div class="roster-row"><input data-asset-edit="${a.id}" value="${escapeHtml(a.name)}" style="flex:1"><button class="btn ghost" data-asset-del="${a.id}">Quitar</button></div>`).join('')}</div><div class="row" style="margin-top:10px"><input id="newAsset" placeholder="Nuevo activo (ej. Podcast Tanner)"><button class="btn secondary" data-action="catAdd">Agregar</button></div><button class="btn" style="width:100%;margin-top:14px" data-action="saveCatalog">Guardar catálogo</button></div>`; $('#modal').classList.remove('hidden'); setTimeout(()=>$('#newAsset')?.focus(),60)}
function readCatInputs(){return $$('[data-asset-edit]').map(i=>({id:i.dataset.assetEdit,name:text(i.value)})).filter(a=>a.name)}
function catAdd(){const v=text($('#newAsset')?.value); const list=readCatInputs(); if(v)list.push({id:uid('asset'),name:v}); setAssetCatalog(list); openCatalog()}
function catDel(id){setAssetCatalog(readCatInputs().filter(a=>a.id!==id)); openCatalog()}
function saveCatalog(){const list=readCatInputs(); const v=text($('#newAsset')?.value); if(v)list.push({id:uid('asset'),name:v}); if(!list.length)return toast('Deja al menos un activo en el catálogo.'); setAssetCatalog(list); closeModal(); toast('Catálogo actualizado')}
function printSponsorSheet(id){const s=repos.sponsors.find(id); if(!s)return; const on=(s.assets||[]).filter(a=>a.on!==false); const meta=[]; if(s.tier)meta.push(s.tier); if(s.status)meta.push(s.status); const vig=`${s.startDate||'—'}  a  ${s.endDate||'—'}`; const rows=on.length?on.map((a,i)=>`<tr><td style="padding:8px 10px;border-bottom:1px solid #E6E5DC">${i+1}. ${escapeHtml(a.name)}</td><td style="padding:8px 10px;border-bottom:1px solid #E6E5DC;color:#555">${escapeHtml(a.note||'')}</td></tr>`).join(''):'<tr><td style="padding:10px">Sin activos asignados.</td><td></td></tr>'; const html=`<div style="font-family:Arial,Helvetica,sans-serif;color:#0E2D52;padding:6px 4px;max-width:760px"><div style="display:flex;align-items:center;gap:14px;border-bottom:3px solid #B8A464;padding-bottom:14px;margin-bottom:18px"><img src="${LOGO}" style="width:62px;height:62px;object-fit:contain"><div><div style="font-size:12px;letter-spacing:3px;color:#B8A464;font-weight:700">TANNERY CITY · FOOTBALL CLUB</div><div style="font-size:26px;font-weight:800">Ficha de patrocinio</div></div></div><h2 style="margin:0 0 4px;font-size:22px">${escapeHtml(s.name)}</h2><div style="color:#555;margin-bottom:14px">${escapeHtml(meta.join(' · '))}</div><table style="width:100%;border-collapse:collapse;margin-bottom:18px"><tr><td style="padding:6px 0;width:180px;color:#888">Vigencia</td><td style="padding:6px 0;font-weight:700">${escapeHtml(vig)}</td></tr>${s.amount?`<tr><td style="padding:6px 0;color:#888">Monto</td><td style="padding:6px 0;font-weight:700">${money(s.amount)}</td></tr>`:''}${(s.contactName||s.phone)?`<tr><td style="padding:6px 0;color:#888">Contacto</td><td style="padding:6px 0">${escapeHtml(s.contactName||'')} ${s.phone?'· '+escapeHtml(s.phone):''}</td></tr>`:''}</table><h3 style="border-bottom:2px solid #056C7F;padding-bottom:6px;color:#056C7F">Activos digitales incluidos (${on.length})</h3><table style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left;padding:8px 10px;background:#F2F1EA">Activo</th><th style="text-align:left;padding:8px 10px;background:#F2F1EA">Detalle</th></tr></thead><tbody>${rows}</tbody></table><p style="margin-top:26px;color:#B8A464;font-weight:700;letter-spacing:2px;font-size:12px">CURTIMOS CAMPEONES DEL MUNDO · #WEARETANNERS</p><p style="color:#999;font-size:11px">Generado por TannerOS · ${new Date().toLocaleDateString('es-MX')}</p></div>`; let area=document.getElementById('print-area'); if(!area){area=document.createElement('div'); area.id='print-area'; document.body.appendChild(area)} area.innerHTML=html; document.body.classList.add('printing'); toast('Abriendo impresión: elige "Guardar como PDF"'); setTimeout(()=>{try{if(typeof window.print==='function')window.print()}catch(e){} document.body.classList.remove('printing')},150)}
function renderTienda(){return simpleModule('products','Tienda Tanner',[['name','Producto'],['price','Precio'],['stock','Stock'],['status','Estado']],'tienda')}
function renderScouting(){const rows=repos.prospects.list(); return `<div class="between"><h2>Talento en seguimiento</h2><button class="btn" data-form="prospect">${icon('scouting')} Nuevo talento</button></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th>Prospecto</th><th>Edad</th><th>Categoría</th><th>Teléfono</th><th>Recomendó</th><th>Seguimiento</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr><td><div class="name-cell">${avatarHtml(p,'sm')}<strong>${escapeHtml(p.name)}</strong></div></td><td>${escapeHtml(p.age)}</td><td>${escapeHtml(p.category)}</td><td>${escapeHtml(p.phone)}</td><td>${escapeHtml(p.recommendedBy)}</td><td><span class="badge">${escapeHtml(p.status)}</span></td><td><button class="btn ghost" data-edit-prospect="${p.id}">Editar</button></td></tr>`).join('')}</tbody></table></div>`:emptyState('scouting','Aún no hay talento en seguimiento. Registra tu primer prospecto.','<button class="btn" data-form="prospect">Nuevo talento</button>')}`}
function renderConvocatoria(){const cats=playerCategories(); if(!state.conv)state.conv={category:'',type:'Partido oficial',rival:'',date:dateOnly(),place:'',jersey:'',picks:{}}; const cv=state.conv; const players=repos.players.list().filter(p=>!cv.category||p.category===cv.category); const types=['Partido oficial','Amistoso','Torneo','Entrenamiento especial','Fase Final']; const bucket=v=>players.filter(p=>(cv.picks[p.id]||'')===v); const conv=bucket('c'),duda=bucket('d'),no=bucket('n'); return `<div class="between"><h2>Convocatoria</h2><button class="btn" data-action="saveConv">${icon('send')} Convocar</button></div><div class="card"><div class="form-grid"><div><label>Categoría</label><select id="cvCat" data-conv="category"><option value="">Selecciona categoría</option>${cats.map(c=>`<option ${cv.category===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select></div><div><label>Tipo de evento</label><select id="cvType" data-conv="type">${types.map(t=>`<option ${cv.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div><label>Rival / Nombre del evento</label><input id="cvRival" data-conv="rival" value="${escapeHtml(cv.rival)}" placeholder="ej. Tannery City T10 vs Atlético León"></div><div><label>Fecha</label><input type="date" id="cvDate" data-conv="date" value="${escapeHtml(cv.date)}"></div><div><label>Sede</label><input id="cvPlace" data-conv="place" value="${escapeHtml(cv.place)}" placeholder="ej. Tannery City Park"></div><div><label>Jersey</label><input id="cvJersey" data-conv="jersey" value="${escapeHtml(cv.jersey)}" placeholder="ej. Rosa Cantera"></div></div></div><div class="conv-cols"><div class="card"><div class="between" style="margin-bottom:8px"><strong>Jugadores ${cv.category?'· '+escapeHtml(cv.category):''}</strong><div class="row"><button class="btn ghost" data-conv-all="c">Todos convocados</button><button class="btn ghost" data-conv-all="">Limpiar</button></div></div>${cv.category?(players.length?players.map(p=>{const v=cv.picks[p.id]||''; return `<div class="roster-row"><span>${escapeHtml(p.name+' '+p.apellidos)}</span><div class="segb"><button class="${v==='c'?'on-c':''}" data-pick="${p.id}" data-val="c">Convocado</button><button class="${v==='d'?'on-d':''}" data-pick="${p.id}" data-val="d">En duda</button><button class="${v==='n'?'on-n':''}" data-pick="${p.id}" data-val="n">No</button></div></div>`}).join(''):'<div class="empty">Sin jugadores en esta categoría.</div>'):'<div class="empty">Selecciona una categoría para ver la plantilla.</div>'}</div><div class="card"><h3>Vista previa del mensaje</h3><div class="msg-prev" id="cvMsg">${escapeHtml(convMessage())}</div><button class="btn" style="width:100%;margin-top:12px" data-action="copyConv">${icon('copy')} Copiar mensaje</button><div class="row" style="margin-top:10px"><span class="badge good">${conv.length} convocados</span><span class="badge warn">${duda.length} en duda</span><span class="badge bad">${no.length} no disponibles</span></div></div></div>`}
function convMessage(){const cv=state.conv; if(!cv)return ''; const players=repos.players.list().filter(p=>!cv.category||p.category===cv.category); const conv=players.filter(p=>cv.picks[p.id]==='c'); const duda=players.filter(p=>cv.picks[p.id]==='d'); const L=[]; L.push('CONVOCATORIA · TANNERY CITY'); if(cv.type)L.push(cv.type.toUpperCase()); if(cv.rival)L.push(cv.rival); const meta=[]; if(cv.date)meta.push('Fecha: '+cv.date); if(cv.place)meta.push('Sede: '+cv.place); if(cv.jersey)meta.push('Jersey: '+cv.jersey); if(meta.length)L.push(meta.join('  ·  ')); L.push(''); L.push('CONVOCADOS:'); L.push(conv.length?conv.map((p,i)=>`${i+1}. ${p.name} ${p.apellidos}`).join('\n'):'—'); if(duda.length){L.push(''); L.push('EN DUDA:'); L.push(duda.map(p=>`- ${p.name} ${p.apellidos}`).join('\n'))} L.push(''); L.push('Curtimos campeones del mundo. #WeAreTanners'); return L.join('\n')}
function refreshConvMsg(){const el=$('#cvMsg'); if(el)el.textContent=convMessage()}
function setConvField(k,v){if(!state.conv)return; state.conv[k]=v; if(k==='category'){renderModule('convocatoria')}else refreshConvMsg()}
function setPick(id,val){if(!state.conv)return; if(state.conv.picks[id]===val)delete state.conv.picks[id]; else state.conv.picks[id]=val; renderModule('convocatoria')}
function pickAllConv(val){if(!state.conv||!state.conv.category)return; const players=repos.players.list().filter(p=>p.category===state.conv.category); state.conv.picks={}; if(val)players.forEach(p=>state.conv.picks[p.id]=val); renderModule('convocatoria')}
function saveConv(){const cv=state.conv; if(!cv||!cv.category)return toast('Selecciona una categoría.'); const roster=Object.entries(cv.picks).map(([id,v])=>({id,v})); repos.events.upsert({title:cv.rival||`Convocatoria ${cv.category}`,rival:cv.rival,type:cv.type,date:cv.date,place:cv.place,jersey:cv.jersey,roster:JSON.stringify(roster),status:'Convocado',notes:`${roster.filter(r=>r.v==='c').length} convocados`}); toast('Convocatoria guardada'); state.conv=null; renderModule('convocatoria')}
function birthdaysInMonth(month){return repos.players.list().map(p=>{if(!p.birthDate)return null; const d=new Date(p.birthDate); if(isNaN(d))return null; if(d.getMonth()!==month)return null; return {day:d.getDate(),name:`${p.name} ${p.apellidos}`,turns:ageFrom(p.birthDate)}}).filter(Boolean).sort((a,b)=>a.day-b.day)}
function sponsorMonthEvents(year,month){const mk=`${year}-${String(month+1).padStart(2,'0')}`; const out=[]; repos.sponsors.list().forEach(s=>{const add=(date,title,type)=>{if(date&&dateOnly(date).slice(0,7)===mk)out.push({date:dateOnly(date),title,type})}; add(s.startDate,'Inicio patrocinio: '+s.name,'Patrocinio'); add(s.endDate,'Fin de contrato: '+s.name,'Patrocinio'); if(s.endDate){const rd=new Date(new Date(s.endDate+'T00:00:00').getTime()-90*86400000); if(!isNaN(rd))add(rd.toISOString(),'Renegociar: '+s.name,'Renovación')}}); return out}
function renderCalendario(){const ref=state.calRef||new Date(); const year=ref.getFullYear(),month=ref.getMonth(); const first=new Date(year,month,1).getDay(); const dim=new Date(year,month+1,0).getDate(); const today=new Date(); const evs=repos.events.list().filter(e=>{const d=dateOnly(e.date); return d.slice(0,7)===`${year}-${String(month+1).padStart(2,'0')}`}).concat(sponsorMonthEvents(year,month)); const evByDay={}; evs.forEach(e=>{const dd=Number(dateOnly(e.date).slice(8,10)); (evByDay[dd]||(evByDay[dd]=[])).push(e)}); const bds=birthdaysInMonth(month); const bdByDay={}; bds.forEach(b=>{(bdByDay[b.day]||(bdByDay[b.day]=[])).push(b)}); const dows=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']; let cells=''; for(let i=0;i<first;i++)cells+=`<div class="cal-cell muted-day"></div>`; for(let d=1;d<=dim;d++){const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d; const ev=evByDay[d]||[]; const bd=bdByDay[d]||[]; cells+=`<div class="cal-cell ${isToday?'today':''}"><div class="d">${d}</div>${ev.length?`<span class="cal-dot ev"></span>`:''}${bd.length?`<span class="cal-dot bd"></span>`:''}${ev.slice(0,2).map(e=>`<div class="cal-ev">${escapeHtml(e.title||e.type||'Evento')}</div>`).join('')}${bd.slice(0,2).map(b=>`<div class="cal-bd">${icon('cake',11)} ${escapeHtml(b.name.split(' ')[0])}${b.turns!==''?' ('+b.turns+')':''}</div>`).join('')}</div>`} const agendaEv=evs.sort((a,b)=>dateOnly(a.date).localeCompare(dateOnly(b.date))); return `<div class="grid cols-2" style="align-items:start"><div class="card"><div class="between"><button class="btn ghost" data-cal="-1">‹ Anterior</button><strong style="font-family:var(--disp);font-size:18px">${MES[month]} ${year}</strong><button class="btn ghost" data-cal="1">Siguiente ›</button></div><div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div></div><div class="card"><h3>Agenda de ${MES[month]}</h3>${agendaEv.length?agendaEv.map(e=>`<div class="roster-row"><div><strong>${escapeHtml(e.title||e.type||'Evento')}</strong><div class="muted" style="font-size:12px">${escapeHtml(dateOnly(e.date))} · ${escapeHtml(e.type||'')} ${e.place?'· '+escapeHtml(e.place):''}</div></div></div>`).join(''):'<div class="empty" style="padding:14px">Sin eventos este mes.</div>'}<h3 style="margin-top:16px">Cumpleaños de ${MES[month]}</h3>${bds.length?bds.map(b=>`<div class="roster-row"><span>${icon('cake')} ${escapeHtml(b.name)}</span><span class="badge" style="background:#FBF3DA;color:#7A6A2E">${b.day} ${MES[month].slice(0,3)}${b.turns!==''?' · cumple '+(b.turns):''}</span></div>`).join(''):'<div class="empty" style="padding:14px">Sin cumpleaños este mes. Agrega fechas de nacimiento en Jugadores.</div>'}</div></div>`}

function savePlayer(id,force){const name=text($('#f_name').value); if(!name)return vErr('El nombre del jugador es obligatorio.'); const existing=id?repos.players.find(id):null; const number=text($('#f_number')?.value); const category=text($('#f_category')?.value); if(number){const clash=repos.players.list().find(p=>p.id!==id&&text(p.number)===number&&norm(p.category)===norm(category)); if(clash)return vErr(`El número ${number} ya lo tiene ${clash.name} ${clash.apellidos} en ${category||'esa categoría'}. Usa otro (puedes repetir el número en otra categoría).`)} const photo=pendingPhoto!==null?pendingPhoto:(existing?.photoData||''); const r={id:id||undefined,code:existing?.code||nextTannerCode(),name,apellidos:$('#f_apellidos').value,number,category,position:$('#f_position')?.value,size:$('#f_size')?.value,birthDate:$('#f_birthDate').value,monthlyFee:$('#f_monthlyFee')?.value,tutor:$('#f_tutor').value,phone:$('#f_phone').value,email:$('#f_email').value,emergencyContact:$('#f_emergencyContact')?.value,emergencyPhone:$('#f_emergencyPhone')?.value,blood:$('#f_blood')?.value,allergies:$('#f_allergies')?.value,scholarship:$('#f_scholarship')?.checked,scholarshipType:$('#f_scholarshipType')?.value,captain:$('#f_captain')?.checked,docActa:$('#f_docActa')?.checked,docCurp:$('#f_docCurp')?.checked,docStudies:$('#f_docStudies')?.checked,status:$('#f_status').value,notes:$('#f_notes').value,photoData:photo,photoUpdatedAt:pendingPhoto!==null?now():(existing?.photoUpdatedAt||'')}; const dup=repos.players.list().find(p=>p.id!==id&&norm(p.name+' '+p.apellidos)===norm(r.name+' '+r.apellidos)&&((p.phone&&p.phone===r.phone)||(p.tutor&&norm(p.tutor)===norm(r.tutor)))); if(dup&&!force)return showDupWarn(id); repos.players.upsert(r); pendingPhoto=null; closeModal(); renderModule('jugadores'); toast('Jugador guardado')}
function saveCobro(){const concept=text($('#f_concept').value); const amount=num($('#f_amount').value); const method=$('#f_method').value; if(!concept)return vErr('Escribe el concepto del cobro.'); if(amount<=0)return vErr('El monto debe ser mayor a 0.'); if(!method)return vErr('Selecciona el método de pago (efectivo, transferencia…).'); const pid=$('#f_playerId').value; const p=repos.players.find(pid)||{}; repos.payments.upsert({type:'income',category:$('#f_category').value,playerId:pid,playerName:p.name?`${p.name} ${p.apellidos}`:'',concept,amount,method,date:$('#f_date').value,reference:$('#f_reference').value,notes:$('#f_notes').value,status:'Cobrado'}); closeModal(); renderModule(state.module==='cobranza'||state.module==='jugadores'?state.module:'taquilla'); toast('Cobro registrado')}
function savePago(){const concept=text($('#f_concept').value); const amount=num($('#f_amount').value); const supplier=text($('#f_supplier')?.value); const method=$('#f_method').value; if(!supplier)return vErr('Escribe a quién se le pagó (beneficiario).'); if(!concept)return vErr('Escribe el concepto de la salida.'); if(amount<=0)return vErr('El monto debe ser mayor a 0.'); if(!method)return vErr('Selecciona el método de pago (efectivo, transferencia…).'); repos.payments.upsert({type:'expense',category:$('#f_category').value,supplierName:supplier,concept,amount,method,date:$('#f_date').value,reference:$('#f_reference').value,notes:$('#f_notes').value,status:'Pagado'}); closeModal(); renderModule(state.module==='cobranza'?'cobranza':'taquilla'); toast('Salida registrada')}
function saveProspect(id){const name=text($('#f_name').value); if(!name)return vErr('El nombre del talento es obligatorio.'); const tutor=text($('#f_tutor')?.value); const digits=text($('#f_phone')?.value); if(!tutor)return vErr('Pon el nombre del tutor para contactar.'); if(!digits)return vErr('El teléfono es obligatorio.'); const phone=`${$('#f_code')?.value||'+52'} ${digits}`.trim(); const canal=$('#f_source')?.value||''; const existing=id?repos.prospects.find(id):null; const photo=pendingPhoto!==null?pendingPhoto:(existing?.photoData||''); repos.prospects.upsert({id:id||undefined,name,age:$('#f_age')?.value,category:$('#f_category')?.value,tutor,phone,source:canal,contactChannel:canal,recommendedBy:$('#f_rec')?.value,trialDate:$('#f_trial')?.value,status:$('#f_status')?.value,photoData:photo,photoUpdatedAt:pendingPhoto!==null?now():(existing?.photoUpdatedAt||'')}); pendingPhoto=null; closeModal(); renderModule('scouting'); toast('Talento guardado')}
