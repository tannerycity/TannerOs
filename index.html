/* ============ QA ============ */
function runTests(kind){const tests=[]; const add=(name,fn)=>{try{const ok=!!fn(); tests.push({id:uid('qa'),test:name,status:ok?'PASS':'FAIL',message:ok?'OK':'Revisar',createdAt:now()})}catch(e){tests.push({id:uid('qa'),test:name,status:'FAIL',message:e.message,createdAt:now()})}}; add('Login activo',()=>!!state.session); add('Render principal',()=>!!$('#view')&&$('#view').innerHTML.length>10); add('Navegación disponible',()=>MODULES.length>=10); add('Repositorio jugadores',()=>Array.isArray(repos.players.list())); add('Repositorio pagos',()=>Array.isArray(repos.payments.list())); add('Dedupe pagos no usa solo jugador',()=>paymentKey({playerId:'1',concept:'A',amount:1,date:'2026-01-01'})!==paymentKey({playerId:'1',concept:'B',amount:1,date:'2026-01-01'})); add('Dedupe jugadores por nombre/teléfono',()=>rowsOverlap('players',normalizePlayer({name:'Juan',phone:'477'}),normalizePlayer({name:'Juan',phone:'477'}))); add('Sync sin URL no rompe',()=>typeof hasBackend==='function'); add('Cache disponible',()=>{localStorage.setItem('qa_ping','1');return localStorage.getItem('qa_ping')==='1'}); add('Cola sync disponible',()=>Array.isArray(storage.get(K.queue,[]))); add('Render recovery disponible',()=>typeof recoverRenderIfBlank==='function'); add('Sin acciones peligrosas visibles',()=>!([...document.body.querySelectorAll('button,a,h1,h2,h3,td,th,label,option')].map(e=>e.textContent).join(' ')).toLowerCase().match(/borrar todo|eliminar todo|clear all|delete all|wipe|limpiar base/)); add('Taquilla con Cobrar y Pagar',()=>renderTaquilla().includes('data-form="cobro"')&&renderTaquilla().includes('data-form="pago"')); add('Cobro es ingreso y Pago es egreso',()=>isIncome({type:'income'})===true&&isIncome({type:'expense'})===false); add('Balance = ingresos - egresos',()=>cashTotals([{type:'income',amount:100},{type:'expense',amount:40}]).balance===60); add('Repos partidos disponibles',()=>Array.isArray(repos.matches.list())&&Array.isArray(repos.matchStats.list())); add('Estadística de jugador calcula',()=>typeof playerSportStats==='function'&&typeof playerSportStats('x').goals==='number'); add('Foto comprime a base64',()=>typeof compressImage==='function'); add('Ficha deportiva exportable',()=>typeof fichaText==='function'); add('Repos patrocinadores',()=>Array.isArray(repos.sponsors.list())); add('Alerta renovación a 90 días',()=>{const d=new Date(Date.now()+60*86400000).toISOString().slice(0,10); return sponsorRenew({endDate:d}).state==='soon'}); add('Export CSV disponible',()=>typeof toCSV==='function'&&typeof exportPlayersCSV==='function'); add('Código Tanner legible',()=>/^Tanner\d{3,}$/.test(nextTannerCode())); if(kind==='critical'){add('URL backend configurable',()=>true); add('Módulo QA renderiza',()=>typeof renderQA==='function'); add('Contabilidad ingresos/egresos',()=>typeof cashTotals==='function'); add('Partido y estadística guardables',()=>typeof saveMatch==='function'&&typeof saveSession==='function'); add('Permisos no rompen app',()=>can('inicio')===true)} const old=storage.get(K.qaResults,[]); storage.set(K.qaResults,[...tests,...old].slice(0,300)); tests.forEach(t=>repos.qaResults.upsert(t,{queue:false})); backend.qaResult({id:uid('qar'),kind,results:tests,createdAt:now()}); renderModule('qa'); toast(`${kind==='critical'?'QA crítico':'Smoke'}: ${tests.filter(t=>t.status==='PASS').length}/${tests.length}`)}
function exportQA(){const blob=new Blob([JSON.stringify(storage.get(K.qaResults,[]),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='TannerOS_v1_QA.json'; a.click(); URL.revokeObjectURL(a.href)}
function fallback(e){return `<div class="card">${icon('bolt',30)}<h2>Algo no cargó bien</h2><p class="muted">${escapeHtml(e.message||e)}</p><div class="row"><button class="btn" data-nav="inicio">Ir a Inicio</button><button class="btn secondary" data-nav="qa">Abrir Control de Calidad</button></div></div>`}
function recoverRenderIfBlank(){setTimeout(()=>{const v=$('#view'); if(state.session&&v&&!v.innerHTML.trim()){v.innerHTML=fallback(new Error('Pantalla vacía recuperada'))}},200)}
function saveSettings(){const s=storage.get(K.settings,{}); s.appScriptUrl=$('#appScriptUrl').value.trim(); storage.set(K.settings,s); setSync(s.appScriptUrl?'Pendiente':'Configura sincronización'); syncEngine.start(); toast('Conexión guardada')}
async function testConnection(){if(!hasBackend()){setSync('Configura sincronización'); toast('Pega primero la URL de Apps Script'); return} try{setSync('Guardando'); const r=await backend.ping(); state.lastError=''; setSync('Sincronizado'); toast(r.message||r.msg||'Conexión correcta'); renderModule('sync')}catch(e){state.lastError=e.message; setSync('Error al sincronizar'); toast(e.message); renderModule('sync')}}
async function replaceLocalFromSheets(){if(!hasBackend())return toast('Pega primero la URL de Apps Script'); try{state.syncing=true; setSync('Guardando'); storage.set(K.queue,[]); const data=(await backend.bootstrap()).data||{}; ENTITIES.forEach(e=>{if(repos[e])repos[e].saveAll(mergeByUpdatedAt([],Array.isArray(data[e])?data[e]:[],e))}); storage.set(K.lastSync,{at:now(),ok:true,counts:counts()}); state.lastError=''; setSync('Sincronizado'); toast('Datos reemplazados desde Google Sheets')}catch(e){state.lastError=e.message; setSync('Error al sincronizar'); toast(e.message)}finally{state.syncing=false; state.confirmReplace=false; renderModule('sync')}}

/* ============ EVENTOS ============ */
function bind(){
document.addEventListener('click',e=>{
 const go=e.target.closest('[data-search-go]'); if(go){navigate(go.dataset.searchGo); closeSearch(); return}
 const t=e.target.closest('button'); if(!t)return;
 if(t.dataset.nav)return navigate(t.dataset.nav);
 if(t.dataset.action==='menu')return $('#sidebar')?.classList.toggle('open');
 if(t.dataset.action==='searchToggle'){$('#topbar')?.classList.toggle('search-open'); setTimeout(()=>$('#gsearch')?.focus(),30); return}
 if(t.dataset.action==='login')return doLogin();
 if(t.dataset.action==='logout')return auth.logout();
 if(t.dataset.action==='onbNext')return onbNext();
 if(t.dataset.action==='onbSkip')return onbSkip();
 if(t.dataset.action==='syncNow')return syncEngine.syncNow(true);
 if(t.dataset.action==='saveSettings')return saveSettings();
 if(t.dataset.action==='testConnection')return testConnection();
 if(t.dataset.action==='replaceLocalAsk'){state.confirmReplace=true; return renderModule('sync')}
 if(t.dataset.action==='replaceLocalCancel'){state.confirmReplace=false; return renderModule('sync')}
 if(t.dataset.action==='replaceLocalDo')return replaceLocalFromSheets();
 if(t.dataset.action==='newSession')return newSession();
 if(t.dataset.action==='saveSession')return saveSession();
 if(t.dataset.action==='inviteGuest')return openInviteGuest();
 if(t.dataset.addGuest!==undefined)return addGuest(t.dataset.addGuest);
 if(t.dataset.delGuest!==undefined)return delGuest(t.dataset.delGuest);
 if(t.dataset.delPlayer!==undefined)return openDeleteConfirm(t.dataset.delPlayer);
 if(t.dataset.delConfirm!==undefined)return confirmDeletePlayer(t.dataset.delConfirm);
 if(t.dataset.action==='saveMatch')return saveMatch();
 if(t.dataset.action==='saveConv')return saveConv();
 if(t.dataset.action==='copyConv')return copyText(convMessage());
 if(t.dataset.action==='closeModal')return closeModal();
 if(t.dataset.action==='runSmoke')return runTests('smoke');
 if(t.dataset.action==='runCriticalQA')return runTests('critical');
 if(t.dataset.action==='exportQA')return exportQA();
 if(t.dataset.action==='exportContab')return exportContabCSV();
 if(t.dataset.action==='openCatalog')return openCatalog();
 if(t.dataset.action==='catAdd')return catAdd();
 if(t.dataset.action==='saveCatalog')return saveCatalog();
 if(t.dataset.assetDel!==undefined)return catDel(t.dataset.assetDel);
 if(t.dataset.sponsorPdf!==undefined)return printSponsorSheet(t.dataset.sponsorPdf);
 if(t.dataset.atab!==undefined)return setAttTab(t.dataset.atab);
 if(t.dataset.attCat!==undefined)return pickAttCat(t.dataset.attCat);
 if(t.dataset.matchCat!==undefined)return pickMatchCat(t.dataset.matchCat);
 if(t.dataset.pick!==undefined)return setPick(t.dataset.pick,t.dataset.val);
 if(t.dataset.convAll!==undefined)return pickAllConv(t.dataset.convAll);
 if(t.dataset.cal!==undefined)return calNav(Number(t.dataset.cal));
 if(t.dataset.photo==='cam')return $('#photoCam')?.click();
 if(t.dataset.photo==='file')return $('#photoFile')?.click();
 if(t.dataset.photo==='clear')return clearPhoto();
 if(t.dataset.ficha!==undefined)return openFicha(t.dataset.ficha);
 if(t.dataset.fichaCopy!==undefined){const p=repos.players.find(t.dataset.fichaCopy); return p&&copyText(fichaText(p))}
 if(t.dataset.fichaDl!==undefined){const p=repos.players.find(t.dataset.fichaDl); return p&&downloadText('Ficha_'+norm(p.name+'_'+p.apellidos).replace(/\s+/g,'_')+'.txt',fichaText(p))}
 if(t.dataset.fichaCsv!==undefined){const p=repos.players.find(t.dataset.fichaCsv); return p&&downloadCSV('Ficha_'+norm(p.name+'_'+p.apellidos).replace(/\s+/g,'_')+'.csv',fichaCSV(p))}
 if(t.dataset.form)return openForm(t.dataset.form);
 if(t.dataset.editPlayer)return openForm('player',t.dataset.editPlayer);
 if(t.dataset.editProspect)return openForm('prospect',t.dataset.editProspect);
 if(t.dataset.sponsor!==undefined&&t.dataset.editSponsor===undefined)return openSponsor(t.dataset.sponsor);
 if(t.dataset.editSponsor!==undefined)return openForm('sponsor',t.dataset.editSponsor);
 if(t.dataset.action==='exportPlayers')return exportPlayersCSV();
 if(t.dataset.action==='openCategories')return openCategories();
 if(t.dataset.action==='catAddCat')return catAddCat();
 if(t.dataset.catDel!==undefined)return catDelCat(t.dataset.catDel);
 if(t.dataset.plCat!==undefined)return setPlCat(t.dataset.plCat);
 if(t.dataset.dorsales!==undefined)return openDorsales(t.dataset.dorsales);
 if(t.dataset.dorsalNew!==undefined){const parts=t.dataset.dorsalNew.split('|'); return newPlayerWith(parts[0],parts[1])}
 if(t.dataset.cobrarMens!==undefined)return cobrarMensualidad(t.dataset.cobrarMens,t.dataset.cobM);
 if(t.dataset.cobCat!==undefined)return setCob('cat',t.dataset.cobCat);
 if(t.dataset.action==='cobranzaPDF')return printCobranzaSheet();
 if(t.dataset.action==='corteCaja')return printCorteCaja();
 if(t.dataset.savePlayerForce!==undefined)return savePlayer(t.dataset.savePlayerForce||null,true);
 if(t.dataset.savePlayer!==undefined)return savePlayer(t.dataset.savePlayer||null);
 if(t.dataset.saveCobro!==undefined)return saveCobro();
 if(t.dataset.savePago!==undefined)return savePago();
 if(t.dataset.saveProspect!==undefined)return saveProspect(t.dataset.saveProspect||null);
 if(t.dataset.saveSponsor!==undefined)return saveSponsor(t.dataset.saveSponsor||null);
 if(t.dataset.saveUser!==undefined)return saveUser();
 if(t.dataset.saveSimple)return saveSimple(t.dataset.saveSimple)});
const onField=e=>{const d=e.target.dataset||{};
 if(d.filter==='players'){state.plSearch=e.target.value; renderModule('jugadores'); const el=$('#searchPlayers'); if(el){el.focus(); try{el.setSelectionRange(el.value.length,el.value.length)}catch(_){}} return}
 if(e.target.id==='gsearch'){state.search=e.target.value; renderSearchPanel(); return}
 if(e.target.id==='photoCam'||e.target.id==='photoFile')return handlePhotoFile(e.target.files&&e.target.files[0]);
 if(e.target.id==='f_playerId'){const p=repos.players.find(e.target.value); const am=$('#f_amount'); if(am&&p&&p.monthlyFee&&(!am.value||$('#f_category')?.value==='Mensualidad'))am.value=p.monthlyFee; return}
 if(d.acc!==undefined)return setAcc(d.acc,e.target.value);
 if(d.cob!==undefined)return setCob(d.cob,e.target.value);
 if(d.conv!==undefined)return setConvField(d.conv,e.target.value);
 if(d.a!==undefined||d.pu!==undefined||d.un!==undefined||d.in!==undefined)return updateAttStats()};
document.addEventListener('input',onField);
document.addEventListener('change',onField);
document.addEventListener('dragover',e=>{const z=e.target.closest('#photoZone'); if(z){e.preventDefault(); z.classList.add('drag')}});
document.addEventListener('dragleave',e=>{const z=e.target.closest('#photoZone'); if(z)z.classList.remove('drag')});
document.addEventListener('drop',e=>{const z=e.target.closest('#photoZone'); if(z){e.preventDefault(); z.classList.remove('drag'); handlePhotoFile(e.dataTransfer.files&&e.dataTransfer.files[0])}});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.body.classList.contains('login-mode')&&(e.target.id==='loginName'||e.target.id==='loginRole'))return doLogin(); if(e.key==='Escape'){if(!$('#modal').classList.contains('hidden'))return closeModal(); if(state.search)return closeSearch()}});
document.addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
window.addEventListener('online',()=>{state.online=true;syncEngine.syncNow(false)});
window.addEventListener('offline',()=>{state.online=false;setSync('Sin conexión')})}
function doLogin(){auth.login(text($('#loginName')?.value)||'Tanner', $('#loginRole')?.value||'Lectura')}
/* Onboarding */
const ONB=[
 {eye:'Bienvenido a',title:'TANNERY CITY',sub:'Football Club · Academia',body:'El sistema de gestión de tu academia. Jugadores, pagos, asistencia y más — todo sincronizado en tiempo real.'},
 {eye:'Tu club, en orden',title:'TODO EN UNO',sub:'Operación diaria',body:'Plantilla, cobros, asistencia por sesión, convocatorias, calendario con cumpleaños y scouting. Sin complicarte.'},
 {eye:'Último paso',title:'CONECTA',sub:'Google Sheets',body:''}
];
let onbIx=0;
function renderOnboarding(){document.body.className=''; const s=ONB[onbIx]; const settings=storage.get(K.settings,{}); $('#app').innerHTML=`<div class="onb"><div class="login-bg"></div><div class="onb-card"><img src="${LOGO}" alt=""><div class="onb-eye">${escapeHtml(s.eye)}</div><div class="onb-title">${escapeHtml(s.title)}</div><div class="onb-sub">${escapeHtml(s.sub)}</div><div class="onb-ln"></div><div class="onb-body">${onbIx<2?escapeHtml(s.body):`<label>URL de Google Sheets (Apps Script)</label><input id="onbUrl" value="${escapeHtml(settings.appScriptUrl||'')}" placeholder="https://script.google.com/macros/s/.../exec"><p class="muted" style="font-size:12px;text-align:left;margin-top:8px">Pégala ahora o más tarde en Sincronización.</p>`}</div><div class="onb-dots">${ONB.map((_,i)=>`<i class="${i===onbIx?'on':''}"></i>`).join('')}</div><button class="btn btn-enter" data-action="onbNext">${onbIx<2?'Comenzar configuración →':'Entrar al vestidor'}</button><button class="onb-skip" data-action="onbSkip">Saltar e ir al inicio</button></div></div>`}
function onbNext(){if(onbIx<2){onbIx++; renderOnboarding()}else{const url=text($('#onbUrl')?.value); const s=storage.get(K.settings,{}); s.onboarded=true; if(url)s.appScriptUrl=url; storage.set(K.settings,s); onbIx=0; renderLogin()}}
function onbSkip(){const s=storage.get(K.settings,{}); s.onboarded=true; storage.set(K.settings,s); onbIx=0; renderLogin()}
/* Splash */
function showSplash(done){const el=document.createElement('div'); el.className='splash'; el.innerHTML=`<div><img src="${LOGO}" alt="Tannery City"><div class="wm">TANNERY CITY</div><div class="sb">FOOTBALL CLUB · ACADEMIA</div><div class="ln"></div></div><div class="tag">#WEARETANNERS</div>`; document.body.appendChild(el); setTimeout(()=>{el.classList.add('out'); setTimeout(()=>{el.remove(); done&&done()},500)},1500)}
function route(){if(state.session){renderApp(); syncEngine.start(); setTimeout(()=>syncEngine.syncNow(false),400)} else if(!storage.get(K.settings,{}).onboarded){renderOnboarding()} else renderLogin()}
function initDefaults(){if(!repos.products.count())repos.products.saveAll([{id:uid('prod'),name:'Jersey Tanner',price:500,stock:0,status:'Activo'}]);}
function init(){bind(); legacyMigration(); initDefaults(); state.session=storage.get(K.session,null); showSplash(route)}
init();
})();
</script>
</body>
